name: "Feature Request"
description: "Suggest a new feature or general improvement"
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature or improvement.
        Please explain your idea clearly.

  - type: input
    id: feature-title
    attributes:
      label: "Feature Title"
      description: "Write a short title for your idea."
      placeholder: "Example: Add a web page version for lyrics"
    validations:
      required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: "Feature Type"
      description: "Choose the type of feature or improvement."
      options:
        - "New display format"
        - "Web page version"
        - "New programming language"
        - "Repository structure"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: "Description"
      description: "Explain what you want to add or improve."
      placeholder: "Example: I want a simple web page version that can display the lyrics in the browser."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: "Why is this useful?"
      description: "Explain why this feature would be helpful."
      placeholder: "Example: This would make the project easier to show outside the terminal."
    validations:
      required: false

  - type: textarea
    id: extra-notes
    attributes:
      label: "Extra Notes"
      description: "Add links, references, examples, or other details if needed."
      placeholder: "Example: Similar project, screenshot idea, preferred language, etc."
    validations:
      required: false